name: Feature request
description: Propose a focused improvement or new capability for Harbor.
title: "[Feature]: "
labels:
  - enhancement
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Explain the user problem before the solution. Focused proposals with a small, useful first scope are easier to evaluate.

  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: This request describes a concrete user problem or use case.
          required: true

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      description: Which part of Harbor would this improve?
      options:
        - Playback or mpv
        - Addons, catalogs, or streams
        - Library, metadata, or account
        - Downloads or local media
        - Casting or TV mode
        - Navigation, keyboard, remote, or gamepad
        - Interface or accessibility
        - Native platform integration
        - Build, packaging, or release
        - Not sure
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What are you trying to do, and what is difficult or impossible today?
      placeholder: When using Harbor from a TV with a remote, I cannot ...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the user-visible behavior you want without prescribing unnecessary implementation details.
      placeholder: Harbor should allow ...
    validations:
      required: true

  - type: textarea
    id: value
    attributes:
      label: Why this matters
      description: Who benefits, and what outcome would this enable?
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Smallest useful scope
      description: What is the narrowest version that would still solve the problem?
    validations:
      required: true

  - type: textarea
    id: platforms
    attributes:
      label: Platform impact
      description: Note any expected differences for Windows, macOS, Linux, playback engines, or TV-style input.

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Include current workarounds or other approaches you considered.

  - type: textarea
    id: tradeoffs
    attributes:
      label: Risks or tradeoffs
      description: Call out compatibility, playback, performance, privacy, or maintenance concerns.

  - type: textarea
    id: references
    attributes:
      label: Examples or references
      description: Add links, screenshots, mockups, protocol references, or comparable behavior.

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I would be willing to help implement or test this change.
